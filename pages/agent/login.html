<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Agen | Rumah123</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { DEFAULT: '#E02020', dark: '#C41E1E', light: '#FFF5F5' } },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        };
    </script>
    <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
    <script src="auth.js"></script>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col text-slate-800 antialiased">
    <script>
        if (typeof AgentAuth !== 'undefined' && AgentAuth.isLoggedIn()) {
            window.location.replace('dashboard.html');
        }
    </script>

    <div class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <a href="../index.html" class="inline-flex items-center gap-1 text-white/90 hover:text-white text-sm mb-6">
                    <span aria-hidden="true">←</span> Kembali ke situs publik
                </a>
                <div class="flex justify-center items-baseline gap-1 mb-2">
                    <span class="text-3xl font-bold text-brand">Rumah</span>
                    <span class="text-3xl font-bold text-white">123</span>
                </div>
                <p class="text-slate-400 text-sm">Area agen — akses via URL langsung</p>
                <h1 class="text-xl font-bold text-white mt-4">Masuk sebagai agen</h1>
            </div>

            <div class="bg-white rounded-2xl shadow-xl border border-slate-200/10 p-6 sm:p-8">
                <form id="form-login" class="space-y-5" novalidate>
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email agen</label>
                        <input type="email" id="email" name="email" required autocomplete="username" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand/30 focus:border-brand outline-none" placeholder="agen@contoh.com">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Kata sandi</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password" minlength="6" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand/30 focus:border-brand outline-none" placeholder="••••••••">
                    </div>
                    <p id="err-msg" class="hidden text-sm text-red-600 bg-red-50 border border-red-100 rounded-lg px-3 py-2"></p>
                    <button type="submit" id="btn-submit" class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3 rounded-xl shadow-md transition focus:outline-none focus:ring-2 focus:ring-brand focus:ring-offset-2">
                        Masuk
                    </button>
                </form>
                <p class="text-xs text-slate-400 mt-6 text-center leading-relaxed">
                    Demo: gunakan <code class="bg-slate-100 px-1 rounded">agen@demo.com</code> / <code class="bg-slate-100 px-1 rounded">demo12345</code><br>
                    (tanpa server — penyimpanan sesi di browser saja)
                </p>
            </div>
        </div>
    </div>

    <script>
(function () {
    var DEMO_EMAIL = 'agen@demo.com';
    var DEMO_PASS = 'demo12345';

    document.getElementById('form-login').addEventListener('submit', function (e) {
        e.preventDefault();
        var email = (document.getElementById('email').value || '').trim().toLowerCase();
        var password = document.getElementById('password').value || '';
        var err = document.getElementById('err-msg');
        err.classList.add('hidden');

        if (!email || !password) {
            err.textContent = 'Isi email dan kata sandi.';
            err.classList.remove('hidden');
            return;
        }

        if (email !== DEMO_EMAIL.toLowerCase() || password !== DEMO_PASS) {
            err.textContent = 'Email atau kata sandi tidak sesuai (demo: agen@demo.com / demo12345).';
            err.classList.remove('hidden');
            return;
        }

        var local = email.split('@')[0] || 'Agen';
        var display = local.charAt(0).toUpperCase() + local.slice(1);
        AgentAuth.login(email, display);
        window.location.href = 'dashboard.html';
    });
})();
    </script>
</body>
</html>
